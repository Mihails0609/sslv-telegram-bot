name: Check SS.lv every hour

on:
  schedule:
    # Katras 15 minutes - vairak palaisanas izlidzina GitHub Actions neuzticamibu
    - cron: '*/15 * * * *'
  workflow_dispatch:  # Lauj palaist manuali no GitHub UI

# Pasargajam no vairaku palaisanu paralelas izpildes
# Ja jauna palaisana sakas, kamer veca vel notiek - jauna gaida, ka veca pabeigs
concurrency:
  group: sslv-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Vajadzigs, lai commitatu seen_ads.json atpakal

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run SS.lv checker
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit updated seen_ads.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seen_ads.json
          if git diff --staged --quiet; then
            echo "Nav izmainu seen_ads.json - neko necommitam"
          else
            git commit -m "Atjauninu seen_ads.json [auto]"
            # Drosibas tikls - ja kads cits commit notika starpa, paljemam ta izmainas un parspeleejam savas
            # Ja konflikts seen_ads.json - vienkarsi pajemam mizu versiju (vinas IDi pielikti pie musu)
            for i in 1 2 3; do
              git pull --rebase --strategy-option=theirs || true
              if git push; then
                echo "Push veiksmigs no $i meginajuma"
                break
              else
                echo "Push neizdevas, meginu velreiz ($i)..."
                sleep 2
              fi
            done
          fi
